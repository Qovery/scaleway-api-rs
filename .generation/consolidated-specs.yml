            \
              X-Auth-Token:$SCW_SECRET_KEY \
              name==string
    patch:
      tags:
        - Records
      operationId: UpdateDNSZoneRecords
      summary: Update DNS zone records
      description: |
        Only available with default NS.<br/>
        Send a list of actions and records.

        Action can be:
         - add:
          - Add new record
          - Can be more specific and add a new IP to an existing A record for example
         - set:
          - Edit a record
          - Can be more specific and edit an IP from an existing A record for example
         - delete:
          - Delete a record
          - Can be more specific and delete an IP from an existing A record for example
         - clear:
          - Delete all records from a DNS zone

        All edits will be versioned.
      parameters:
        - in: path
          name: dns_zone
          description: The DNS zone where the DNS zone records will be updated
          required: true
          schema:
            type: string
            description: The DNS zone where the DNS zone records will be updated
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/scaleway.domain.v2beta1.UpdateDNSZoneRecordsResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                changes:
                  type: array
                  description: The changes made to the records
                  items:
                    $ref: '#/components/schemas/scaleway.domain.v2beta1.RecordChange'
                return_all_records:
                  type: boolean
                  description: Whether or not to return all the records
                  nullable: true
                disallow_new_zone_creation:
                  type: boolean
                  description: >-
                    Forbid the creation of the target zone if not existing
                    (default action is yes)
                serial:
                  type: integer
                  description: >-
                    Don't use the autoincremenent serial but the provided one (0
                    to keep the same)
                  nullable: true
              required:
                - changes
              x-properties-order:
                - changes
                - return_all_records
                - disallow_new_zone_creation
                - serial
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X PATCH \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -d '{"changes":[""],"disallow_new_zone_creation":false}' \
              "https://api.scaleway.com/domain/v2beta1/dns-zones/{dns_zone}/records"
        - lang: HTTPie
          source: >-
            http PATCH
            "https://api.scaleway.com/domain/v2beta1/dns-zones/{dns_zone}/records"
            \
              X-Auth-Token:$SCW_SECRET_KEY \
