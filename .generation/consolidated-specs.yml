                    used only when autoscaling is enabled.
                  nullable: true
                max_size:
                  type: integer
                  description: >-
                    The maximum size of the pool. Note that this field will be
                    used only when autoscaling is enabled.
                  nullable: true
                container_runtime:
                  type: string
                  description: >
                    The customization of the container runtime is available for
                    each pool. Note that `docker` is deprecated since 1.20 and
                    will be removed in 1.24.
                  enum:
                    - unknown_runtime
                    - docker
                    - containerd
                    - crio
                  default: unknown_runtime
                autohealing:
