                  description: >
                    The system volume disk type, we provide two different types
                    of volume (`volume_type`):
                      - `l_ssd` is a local block storage: your system is stored locally on
                        the hypervisor of your node.
                      - `b_ssd` is a remote block storage: your system is stored on a
                        centralised and resilient cluster.
                  enum:
                    - default_volume_type
                    - l_ssd
                    - b_ssd
                  default: default_volume_type
                root_volume_size:
                  type: integer
                  description: The system volume disk size (in bytes)
                  nullable: true
              required:
