        and the price with a call to listOffers
        (https://developers.scaleway.com/en/products/baremetal/api/#get-78db92).
        Then you can add the option
        https://developers.scaleway.com/en/products/baremetal/api/#post-b14abd.
        Do not forget to delete the Option.
         After start BMC, you need to Get Remote Access to get the login/password https://developers.scaleway.com/en/products/baremetal/api/#get-cefc0f.
      parameters:
        - in: path
          name: zone
