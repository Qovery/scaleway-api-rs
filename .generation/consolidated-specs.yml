openapi: 3.0.3
info:
  title: Account API
  description: >
    # Introduction


    The Account API allows you to manage projects. Project is Scaleway’s
    resource management feature. Designed to help you organize your
    infrastructure and cloud services, the feature allows resources to be
    isolated and grouped into specific projects.
  version: v2
servers:
  - url: 'https://api.scaleway.com'
tags:
  - name: Projects
  - name: Servers
    description: |
      A server represents a dedicated elastic metal server.
  - name: Server Actions
    description: |
      Server actions allows you to start, stop or reboot your servers.
  - name: BMC access
    description: >
      BMC (Baseboard Management Controller) access allow you to access serie
      console of your elastic metal server.

      The BMC (Baseboard Management Controller) access feature is available one
      hour after the installation of the server.

      You need first to create an option Remote Access. You will find the ID and
      the price with a call to listOffers
      (https://developers.scaleway.com/en/products/baremetal/api/#get-78db92).
      Then you can add the option
      https://developers.scaleway.com/en/products/baremetal/api/#post-b14abd. Do
      not forget to delete the Option.

      Then you need to create Remote Access
      https://developers.scaleway.com/en/products/baremetal/api/#post-1af723.

      And filnally Get Remote Access to get the login/password
      https://developers.scaleway.com/en/products/baremetal/api/#get-cefc0f.
  - name: Offers
  - name: Options
  - name: OS
  - name: Consumption
    description: >
      The consumption represents the amount of money you have spent for the
      products you have consumed.

      The value is not computed in real time.

      The value of the consumption is a monetary value.
  - name: Invoices
  - name: DNS Zones
  - name: Records
  - name: Versions
  - name: Imports / Exports
  - name: Flexible IP
    description: |
      A Flexible IP can be attached to any server in the same zone.
      A server can be linked with multiple Flexible IPs attached to it.
  - name: SSH Keys
  - name: Groups
  - name: API Keys
  - name: Users
  - name: Applications
  - name: Policies
  - name: Rules
  - name: Permission sets
  - name: Images
    description: >
      Images are backups of your instances.

      You can reuse that image to restore your data or create a series of
      instances with a predefined configuration.


      An image is a complete backup of your server including all volumes.
  - name: Security Groups
    description: >
      A security group is a set of firewall rules on a set of instances.

      Security groups enable to create rules that either drop or allow incoming
      traffic from certain ports of your instances.


      Security Groups are stateful by default which means return traffic is
      automatically allowed, regardless of any rules.

      As a contrary, you have to switch in a stateless mode to define explicitly
      allowed.
  - name: User-Data
    description: >
      User data is a key value store API you can use to provide data from and to
      your server without authentication.


      As an example of use, Scaleway images contain the script
      scw-generate-ssh-keys which generates SSH server’s host keys then stores
      their fingerprints as user data under the key “ssh-host-fingerprints”.

      This way, we ensure they are really connecting to their Scaleway instance
      and they are not victim of a man-in-the-middle attack.


      There are two endpoints to access user data:
       - **From a running instance**, by using the metadata API at http://169.254.42.42/user_data.
         To enhance security, we only allow user data viewing and editing as root.
         To know if the query is issued by the root user, we only accept queries made from a local port below 1024 (by default, non-root users can’t bind ports below 1024).
         To specify the local port with cURL, use `curl --local-port 1-1024 http://169.254.42.42/user_data`
       - **From the instance API** at using methods described bellow.
  - name: Server types
    description: >
      Server types will answer with all instance types available in a given
      zone.

      Each of these types will contains all the features of the instance (CPU,
      RAM, Storage) with their associated pricing.
  - name: Volume types
    description: >
      Volume types will answer with all volume types available in a given zone.

      Each of these types will contains all the capabilities and constraints of
      the volume (min size, max size, snapshot).
  - name: IPs
    description: >
      A flexible IP address is an IP address which you hold independently of any
      server.

      You can attach it to any of your servers and do live migration of the IP
      address between your servers.


      Be aware that attaching a flexible IP address to a server will remove the
      previous public IP address of the server and cut any ongoing public
      connection to the server.
  - name: Volumes
    description: >
      A volume is where you store your data inside your instance. It

      appears as a block device on Linux that you can use to create

      a filesystem and mount it.


      We have two different types of volume (`volume_type`):
        - `l_ssd` is a local block storage: your data is downloaded on
          the hypervisor and you need to power off your instance to attach
          or detach a volume.
        - `b_ssd` is a remote block storage: your data is stored on a
          centralised cluster. You can plug and unplug a volume while
          your instance is running. As of today, `b_ssd` is only available
          for `DEV1`, `GP1` and `RENDER` offers.

      note: The `unified` volume type is not available for volumes. This

      type can only be used on snapshots.


      Minimum and maximum volume sizes for each volume types can be queried

      from the zone `/products/volumes` API endpoint. _I.e_ for:
        - `fr-par-1`  use https://api.scaleway.com/instance/v1/zones/fr-par-1/products/volumes
        - `nl-ams-1`  use https://api.scaleway.com/instance/v1/zones/nl-ams-1/products/volumes

      Each types of volumes is also subject to a global quota for the sum of all
      the

      volumes. This quota depends of the level of support and may be

      changed on demand.


      Be wary that when terminating an instance, if you want to keep

      your block storage volume, **you must** detach it beforehand you

      issue the `terminate` call.


      When using multiple block devices, it's advised to mount them by

      using their UUID instead of their device name. A device name is

      subject to change depending on the volumes order. Block devices

      UUIDs can be found in `/dev/disk/by-id/`.
  - name: Snapshots
    description: >
      Snapshots contain the data of a specific volume at a particular point in
      time.

      The data can include the instance's operating system,

      configuration information or files stored on the volume.


      A snapshot can be done from a specific volume (for example you

      have a server with a volume containing the OS and another one

      containing the application data, and you want to use different

      snapshot strategies on both volumes).


      A snapshot's volume type can be either its original volume's type

      (`l_ssd` or `b_ssd`) or `unified`. Similarly, volumes can be created as
      well from snapshots

      of their own type or `unified`. Therefore, to migrate data from a `l_ssd`
      volume

      to a `b_ssd` volume, one can create a `unified` snapshot from the original
      volume

      and a new `b_ssd` volume from this snapshot. The newly created volume will
      hold a copy

      of the data of the original volume.
  - name: Bootscripts
    description: >
      Bootscripts are a combination of a
      [Kernel](https://en.wikipedia.org/wiki/Kernel_(operating_system)) and of
      an [initrd](https://en.wikipedia.org/wiki/Initial_ramdisk).

      They tell to the instance how to start and configure its starting process
      and settings.


      Bootscripts usage is now deprecated.


      Scaleway recommends that you take the "local" boot method that will
      automatically launch your instance with your locally installed kernel.

      It gives you full control over the booting process of your instance.
  - name: Placement Groups
    description: |
      Placement groups allow the user to express a preference regarding
      the physical position of a group of instances. It'll let the user
      choose to either group instances on the same physical hardware for
      best network throughput and low latency or to spread instances on
      far away hardware to reduce the risk of physical failure.

      The operating mode is selected by a `policy_type`. Two policy
      types are available:
        - `low_latency` will group instances on the same hypervisors
        - `max_availability` will spread instances on far away hypervisors

      The `policy_type` is set by default to `max_availability`.

      For each policy types, one of the two `policy_mode` may be selected:
        - `optional` will start your instances even if the constraint is not respected
        - `enforced` guarantee that if the instance starts, the constraint is respected

      The `policy_mode` is set by default to `optional`.
  - name: Private NICs
    description: |
      A Private NIC is the network interface that connects a server to a
      Private Network. There can be at most one Private NIC connecting a
      server to a network.
  - name: Clusters
    description: >
      A cluster is a fully managed Kubernetes cluster.


      It is composed of different pools, each pool containing the same kind of
      nodes.
  - name: Pools
    description: >
      A pool is a set of identical Nodes. A pool has a name, a size (its current
      number of nodes), nodes number limits (min, max) and a Scaleway instance
      type.

      Changing those limits increases/decreases the size of a pool. Thus, when
      autoscaling is enabled, the pool will grow or shrink inside those limits,
      depending on its load.

      A "default pool" is automatically created with every cluster.
  - name: Nodes
    description: >
      A node (short for worker node) is an abstraction for a Scaleway Instance.

      It is part of a pool and is instantiated by Scaleway, making Kubernetes
      software installed and configured automatically on it.

      Please note that Kubernetes nodes cannot be accessed with ssh.
  - name: Backups
    description: |
      Save and restore backups of your database instance.
  - name: Engines
    description: >
      Software that stores and retrieves data from a database. Each database
      engine has a name and versions.
  - name: Database Instances
    description: >
      A Database Instance is composed of one or more Nodes, depending of the
      is_ha_cluster setting. Autohealing is enabled by default for HA clusters.
      Database automated backup is enabled by default in order to prevent data
      loss.
  - name: Read replicas
    description: >
      A read replica is a live copy of the main database instance only available
      for reading. Read replica allows you to scale your database instance for
      read-heavy database workloads. Read replicas can also be used for Business
      Intelligence workloads. Listing of read replicas is available in the
      instance response object.

      A read replica can have at most one direct access and one private network
      endpoint. Loadbalancer endpoint is not available on read replica even if
      this resource is displayed in the read replica response example.

      If you want to remove a read replica endpoint, you can use the instance
      delete endpoint API call.

      Instance Access Control List (ACL) also applies on read replica direct
      access endpoint. Don't forget to set it to improve the security of your
      read replica nodes.

      Be aware that there can be replication lags between the primary node and
      its read replica nodes. You can try to reduce this lag with some good
      practices:

      * All your tables should have a primary key

      * Don't run large transactions that modify, delete or insert lots of rows.
      Try to split it into several small transactions.
  - name: ACL
    description: >
      Network Access Control List allows to control network in and out traffic
      by setting up ACL rules.
  - name: Instance Settings
    description: >
      Instance Settings are tunables of Database Engines. Available settings
      depend on the database engine and its version.
  - name: Privileges
    description: |
      Define some privileges to a user on a specific database.
  - name: Databases
    description: |
      Manage logical databases on your instance
  - name: NodeTypes
    description: |
      Node types powering your instance
  - name: Endpoints
    description: |
      Create and manage database instance endpoints
  - name: Namespaces
    description: >
      A namespace is for images what a folder is for files


      To use our services, the first step is to create a namespace.


      A namespace is for images what a folder is for files. Every push or pull
      must mention the namespace :

      ```docker pull
      rg.nl-ams.scw.cloud/<namespace_name>/<image_name>:<tag_name>```


      Note that a namespace name is unique on a region. Thus, if another client
      already has created "test", you can't have it as a namespace


      A namespace can be either public or private (default), which determines
      who can pull images.
  - name: Tags
    description: |
      A tag represents a container tag of an image.
  - name: Private Networks
    description: |
      A private network allows interconnecting your instances in an
      isolated and private network. The network reachability is limited
      to the instances that are on the same private network.  Network
      Interface Controllers (NICs) are available on the instance and can
      be freely managed (adding IP addresses, shutdown interface...)

      Note that an instance can be a part of multiple private networks.
paths:
  /account/v2/projects:
    get:
      tags:
        - Projects
      operationId: ListProjects
      summary: List projects
      parameters:
        - in: query
          name: organization_id
          description: The organization ID of the project (UUID format)
          schema:
            type: string
            description: The organization ID of the project (UUID format)
            example: 6170692e-7363-616c-6577-61792e636f6d
        - in: query
          name: name
          description: The name of the project
          schema:
            type: string
            description: The name of the project
            nullable: true
        - in: query
          name: page
          description: The page number for the returned projects
          schema:
            type: integer
            description: The page number for the returned projects
            default: 1
        - in: query
          name: page_size
          description: The maximum number of project per page
          schema:
            type: integer
            description: The maximum number of project per page
            default: 20
        - in: query
          name: order_by
          description: The sort order of the returned projects
          schema:
            type: string
            description: The sort order of the returned projects
            enum:
              - created_at_asc
              - created_at_desc
              - name_asc
              - name_desc
            default: created_at_asc
        - in: query
          name: project_ids
          description: Filter out by a list of project ID
          schema:
            type: array
            description: Filter out by a list of project ID
            items:
              type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.account.v2.ListProjectsResponse'
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/account/v2/projects?organization_id=6170692e-7363-616c-6577-61792e636f6d&project_ids=[string]"
        - lang: HTTPie
          source: |-
            http GET "https://api.scaleway.com/account/v2/projects" \
              X-Auth-Token:$SCW_SECRET_KEY \
              organization_id==6170692e-7363-616c-6577-61792e636f6d \
              project_ids==[string]
    post:
      tags:
        - Projects
      operationId: CreateProject
      summary: Create project
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.account.v2.Project'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the project
                organization_id:
                  type: string
                  description: The organization ID of the project (UUID format)
                  example: 6170692e-7363-616c-6577-61792e636f6d
                description:
                  type: string
                  description: The description of the project
                  nullable: true
              x-properties-order:
                - name
                - organization_id
                - description
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X POST \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -d '{"name":"string","organization_id":"6170692e-7363-616c-6577-61792e636f6d"}' \
              "https://api.scaleway.com/account/v2/projects"
        - lang: HTTPie
          source: |-
            http POST "https://api.scaleway.com/account/v2/projects" \
              X-Auth-Token:$SCW_SECRET_KEY \
              name="string" \
              organization_id="6170692e-7363-616c-6577-61792e636f6d"
  '/account/v2/projects/{project_id}':
    get:
      tags:
        - Projects
      operationId: GetProject
      summary: Get project
      parameters:
        - in: path
          name: project_id
          description: The project ID of the project (UUID format)
          required: true
          schema:
            type: string
            description: The project ID of the project (UUID format)
            example: 6170692e-7363-616c-6577-61792e636f6d
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.account.v2.Project'
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/account/v2/projects/{project_id}"
        - lang: HTTPie
          source: >-
            http GET "https://api.scaleway.com/account/v2/projects/{project_id}"
            \
              X-Auth-Token:$SCW_SECRET_KEY
    patch:
      tags:
        - Projects
      operationId: UpdateProject
      summary: Update project
      parameters:
        - in: path
          name: project_id
          description: The project ID of the project (UUID format)
          required: true
          schema:
            type: string
            description: The project ID of the project (UUID format)
            example: 6170692e-7363-616c-6577-61792e636f6d
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.account.v2.Project'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the project
                  nullable: true
                description:
                  type: string
                  description: The description of the project
                  nullable: true
              x-properties-order:
                - name
                - description
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X PATCH \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://api.scaleway.com/account/v2/projects/{project_id}"
        - lang: HTTPie
          source: >-
            http PATCH
            "https://api.scaleway.com/account/v2/projects/{project_id}" \
              X-Auth-Token:$SCW_SECRET_KEY
    delete:
      tags:
        - Projects
      operationId: DeleteProject
      summary: Delete project
      parameters:
        - in: path
          name: project_id
          description: The project ID of the project (UUID format)
          required: true
          schema:
            type: string
            description: The project ID of the project (UUID format)
            example: 6170692e-7363-616c-6577-61792e636f6d
      responses:
        '204':
          description: ''
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X DELETE \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/account/v2/projects/{project_id}"
        - lang: HTTPie
          source: >-
            http DELETE
            "https://api.scaleway.com/account/v2/projects/{project_id}" \
              X-Auth-Token:$SCW_SECRET_KEY
  '/baremetal/v1/zones/{zone}/offers':
    get:
      tags:
        - Offers
      operationId: ListOffers
      summary: List offers
      description: List all available server offers.
      parameters:
        - in: path
          name: zone
          description: The zone you want to target
          required: true
          schema:
            type: string
            description: The zone you want to target
            enum:
              - fr-par-1
              - fr-par-2
              - nl-ams-1
        - in: query
          name: page
          description: Page number
          schema:
            type: integer
            description: Page number
            default: 1
        - in: query
          name: page_size
          description: Number of offers per page
          schema:
            type: integer
            description: Number of offers per page
            default: 20
        - in: query
          name: subscription_period
          description: Period of subscription to filter offers
          schema:
            type: string
            description: Period of subscription to filter offers
            enum:
              - unknown_subscription_period
              - hourly
              - monthly
            default: unknown_subscription_period
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.baremetal.v1.ListOffersResponse'
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/baremetal/v1/zones/{zone}/offers"
        - lang: HTTPie
          source: >-
            http GET "https://api.scaleway.com/baremetal/v1/zones/{zone}/offers"
            \
              X-Auth-Token:$SCW_SECRET_KEY
  '/baremetal/v1/zones/{zone}/offers/{offer_id}':
    get:
      tags:
        - Offers
      operationId: GetOffer
      summary: Get offer
      description: Return specific offer for the given ID.
      parameters:
        - in: path
          name: zone
          description: The zone you want to target
          required: true
          schema:
            type: string
            description: The zone you want to target
            enum:
              - fr-par-1
              - fr-par-2
              - nl-ams-1
        - in: path
          name: offer_id
          description: ID of the researched Offer
          required: true
          schema:
            type: string
            description: ID of the researched Offer
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.baremetal.v1.Offer'
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/baremetal/v1/zones/{zone}/offers/{offer_id}"
        - lang: HTTPie
          source: >-
            http GET
            "https://api.scaleway.com/baremetal/v1/zones/{zone}/offers/{offer_id}"
            \
              X-Auth-Token:$SCW_SECRET_KEY
  '/baremetal/v1/zones/{zone}/options':
    get:
      tags:
        - Options
      operationId: ListOptions
      summary: List options
      description: List all options matching with filters.
      parameters:
        - in: path
          name: zone
          description: The zone you want to target
          required: true
          schema:
            type: string
            description: The zone you want to target
            enum:
              - fr-par-1
              - fr-par-2
              - nl-ams-1
        - in: query
          name: page
          description: Page number
          schema:
            type: integer
            description: Page number
            default: 1
        - in: query
          name: page_size
          description: Number of options per page
          schema:
            type: integer
            description: Number of options per page
            default: 20
        - in: query
          name: offer_id
          description: Filter options by offer_id
          schema:
            type: string
            description: Filter options by offer_id
            nullable: true
        - in: query
          name: name
          description: Filter options by name
          schema:
            type: string
            description: Filter options by name
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.baremetal.v1.ListOptionsResponse'
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/baremetal/v1/zones/{zone}/options"
        - lang: HTTPie
          source: >-
            http GET
            "https://api.scaleway.com/baremetal/v1/zones/{zone}/options" \
              X-Auth-Token:$SCW_SECRET_KEY
  '/baremetal/v1/zones/{zone}/options/{option_id}':
    get:
      tags:
        - Options
      operationId: GetOption
      summary: Get option
      description: Return specific option for the given ID.
      parameters:
        - in: path
          name: zone
          description: The zone you want to target
          required: true
          schema:
            type: string
            description: The zone you want to target
            enum:
              - fr-par-1
              - fr-par-2
              - nl-ams-1
        - in: path
          name: option_id
          description: ID of the option
          required: true
          schema:
            type: string
            description: ID of the option
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.baremetal.v1.Option'
      security:
        - scaleway: []
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET \
              -H "X-Auth-Token: $SCW_SECRET_KEY" \
              "https://api.scaleway.com/baremetal/v1/zones/{zone}/options/{option_id}"
        - lang: HTTPie
          source: >-
            http GET
            "https://api.scaleway.com/baremetal/v1/zones/{zone}/options/{option_id}"
            \
              X-Auth-Token:$SCW_SECRET_KEY
  '/baremetal/v1/zones/{zone}/os':
    get:
      tags:
