                    (DEV1-S, PLAY2-PICO, STARDUST). 'external' is a special node
                    type used to provision instances from other cloud providers.
                placement_group_id:
                  type: string
                  description: >-
                    The placement group ID in which all the nodes of the pool
                    will be created
                  nullable: true
                autoscaling:
