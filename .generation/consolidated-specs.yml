            - attached: Flexible IP is attached to a server

            - error: a Flexible IP operation resulted in an error

            - detaching: Flexible IP is being detached from a server

            - locked: Flexible IP resource is locked
          enum:
            - unknown
            - ready
            - updating
            - attached
            - error
            - detaching
            - locked
