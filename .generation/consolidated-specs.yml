          x-properties-order:
            - enabled
            - maintenance_window
        upgrade_available:
          type: boolean
          description: True if a new Kubernetes version is available
        feature_gates:
          type: array
          description: List of enabled feature gates
          items:
            type: string
        admission_plugins:
          type: array
          description: List of enabled admission plugins
          items:
            type: string
        open_id_connect_config:
          type: object
          description: >-
            This feature is in ALPHA state, it may be deleted or modified. This
            configuration is the [OpenID Connect
            configuration](https://kubernetes.io/docs/reference/access-authn-authz/authentication/#openid-connect-tokens)
            of the Kubernetes API server.
          properties:
            issuer_url:
              type: string
              description: >
                URL of the provider which allows the API server to discover
                public signing keys. Only URLs which use the `https://` scheme
                are accepted. This is typically the provider's discovery URL
                without a path, for example "https://accounts.google.com" or
                "https://login.salesforce.com". This URL should point to the
                level below .well-known/openid-configuration.
            client_id:
              type: string
              description: A client id that all tokens must be issued for
            username_claim:
              type: string
              description: >
                JWT claim to use as the user name. By default `sub`, which is
                expected to be a unique identifier of the end user. Admins can
                choose other claims, such as `email` or `name`, depending on
                their provider. However, claims other than `email` will be
                prefixed with the issuer URL to prevent naming clashes with
                other plugins.
            username_prefix:
              type: string
              description: >
                Prefix prepended to username claims to prevent clashes with
                existing names (such as `system:` users). For example, the value
                `oidc:` will create usernames like `oidc:jane.doe`. If this flag
                isn't provided and `username_claim` is a value other than
                `email` the prefix defaults to `( Issuer URL )#` where `( Issuer
                URL )` is the value of `issuer_url`. The value `-` can be used
                to disable all prefixing.
            groups_claim:
              type: array
              description: JWT claim to use as the user's group
              items:
                type: string
            groups_prefix:
              type: string
              description: >
                Prefix prepended to group claims to prevent clashes with
                existing names (such as `system:` groups). For example, the
                value `oidc:` will create group names like `oidc:engineering`
                and `oidc:infra`.
            required_claim:
              type: array
              description: >
                Multiple key=value pairs that describes a required claim in the
                ID Token. If set, the claims are verified to be present in the
                ID Token with a matching value.
              items:
                type: string
          x-properties-order:
            - issuer_url
            - client_id
            - username_claim
            - username_prefix
            - groups_claim
            - groups_prefix
            - required_claim
        apiserver_cert_sans:
          type: array
          description: >-
            Additional Subject Alternative Names for the Kubernetes API server
            certificate
          items:
            type: string
