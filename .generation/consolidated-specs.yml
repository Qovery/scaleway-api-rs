          format: date-time
          example: '2022-03-22T12:34:56.123456Z'
          nullable: true
        created_at:
          type: string
          description: Date of creation of the Flexible IP (RFC 3339 format)
          format: date-time
          example: '2022-03-22T12:34:56.123456Z'
          nullable: true
        status:
          type: string
          description: >
            - ready : Flexible IP is created and ready to be attached to a
            server or to have a virtual MAC generated.

            - updating: Flexible IP is being attached to a server or a virtual
