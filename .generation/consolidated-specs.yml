        autoscaler_config:
          type: object
          description: The autoscaler config for the cluster
          properties:
            scale_down_disabled:
              type: boolean
              description: Disable the cluster autoscaler
            scale_down_delay_after_add:
              type: string
              description: How long after scale up that scale down evaluation resumes
            estimator:
              type: string
              description: Type of resource estimator to be used in scale up
              enum:
                - unknown_estimator
                - binpacking
              default: unknown_estimator
            expander:
              type: string
              description: Type of node group expander to be used in scale up
              enum:
                - unknown_expander
                - random
                - most_pods
                - least_waste
                - priority
                - price
              default: unknown_expander
            ignore_daemonsets_utilization:
              type: boolean
              description: >-
                Ignore DaemonSet pods when calculating resource utilization for
                scaling down
            balance_similar_node_groups:
              type: boolean
              description: >-
                Detect similar node groups and balance the number of nodes
                between them
            expendable_pods_priority_cutoff:
              type: integer
              description: >-
                Pods with priority below cutoff will be expendable. They can be
                killed without any consideration during scale down and they
                don't cause scale up. Pods with null priority (PodPriority
                disabled) are non expendable.
              format: int32
            scale_down_unneeded_time:
              type: string
              description: >-
                How long a node should be unneeded before it is eligible for
                scale down
            scale_down_utilization_threshold:
              type: number
              description: >-
                Node utilization level, defined as sum of requested resources
                divided by capacity, below which a node can be considered for
                scale down
              format: float
            max_graceful_termination_sec:
              type: integer
              description: >-
                Maximum number of seconds the cluster autoscaler waits for pod
                termination when trying to scale down a node
              format: uint32
          x-properties-order:
