              description: Date of last update of the Virtual MAC (RFC 3339 format)
              format: date-time
              example: '2022-03-22T12:34:56.123456Z'
              nullable: true
            created_at:
              type: string
              description: Date of creation of the Virtual MAC (RFC 3339 format)
              format: date-time
              example: '2022-03-22T12:34:56.123456Z'
              nullable: true
            zone:
