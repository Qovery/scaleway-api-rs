          "message": null,
          "updated_at": "2022-06-21T01:34:55Z",
          "project_id": "xxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxxxxx"
        }
      ]
    }

    ```

    ### List the records of a zone

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/dns-zones/subdomain.domain-external.test/records \
      -H "X-Auth-Token: $secret_key"

    {
      "total_count": 2,
      "records": [
        {
          "data": "ns0.dom.scw.cloud.",
          "name": "",
          "priority": 0,
          "ttl": 0,
          "type": "NS",
          "comment": null
        },
        {
          "data": "ns1.dom.scw.cloud.",
          "name": "",
          "priority": 0,
          "ttl": 0,
          "type": "NS",
          "comment": null
        }
    }
    ```

    ### Patch a zone with record(s)

    Remarks:

    - The `clear` operation clears all the records (thus allows to restart from scratch)
    - The operation works the same as PowerDns patch
    - If the zone does not exist but is included in a managed zone, the API will create the new (sub) zone

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/dns-zones/subdomain.domain-external.test/records \
      -X PATCH \
      -H "X-Auth-Token: $secret_key" \
      -d '{
        "changes": [
          {
            "clear": {}
          },
          {
            "add": {
              "records": [
                {
                  "name": "test1",
                  "data": "127.0.0.1",
                  "type": "A",
                  "ttl": 3600
                },
                {
                  "name": "test2",
                  "data": "127.0.0.1",
                  "type": "A",
                  "ttl": 3600
                }
              ]
            }
          },
          {
            "set": {
              "id_fields": {
                "type": "A",
                "name": "test2"
              },
              "records": [
                {
                  "name": "test2",
                  "data": "127.0.0.2",
                  "type": "A",
                  "ttl": 3600
                }
              ]
            }
          },
          {
            "add": {
              "records": [
                {
                  "name": "test3",
                  "data": "127.0.0.3",
                  "type": "A",
                  "ttl": 3600
                },
                {
                  "name": "test3",
                  "data": "127.0.0.4",
                  "type": "A",
                  "ttl": 3600
                }
              ]
            }
          },
          {
            "delete": {
              "id_fields": {
                "name": "test3",
                "data": "127.0.0.4",
                "type": "A",
                "ttl": 3600
              }
            }
          }
        ]
      }'


    {
      "records": [
        {
          "id": "<UUID>",
          "data": "127.0.0.1",
          "name": "test1",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        },
        {
          "id": "<UUID>",
          "data": "127.0.0.1",
          "name": "test2",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        },
        {
          "id": "<UUID>",
          "data": "127.0.0.2",
          "name": "test2",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        },
        {
          "id": "<UUID>",
          "data": "127.0.0.3",
          "name": "test3",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        }
      ]
    }
    ```

    ### Enable DNSSEC

    For external domain:

    #### You have not DNSSEC set at your registrar

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/domains/example.com/enable-dnssec \
      -X POST \
      -H "Content-Type: application/json" \
      -H "X-Auth-Token: $secret_key" \
      -d '{}'
    ```

    You will have to set in your registrar the `DS` returned in the result:

    ```json
    {
       "domain":{
          "domain":"example.fr",
          "auto_renew_status":"enabled",
          "dnssec_status":"disabled",
          "ds_records":[
             {
                "key_id":49071,
                "algorithm":"ecdsap256sha256",
                "digest":{
                   "type":"sha_384",
                   "digest":"c14421f739e35b62e3383d5972263f93610dea31da48a1990453752cf1b4f4f0314f75ecd0bc9061c51ee41ec7692204"
                }
             }
          ],
          "epp":[
             "clientTransferProhibited"
          ],
          "expired_at":"2021-04-04T12:46:29Z",
          "updated_at":"2020-07-07T13:24:27Z",
          "registrar":"EXTERNAL",
          "is_external":true,
          "status":"active",
          "......"
       }
    ```

    #### You have DNSSEC already set at your registrar

    Call the API with the right settings:

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/domains/example.com/enable-dnssec \
      -X POST \
      -H "Content-Type: application/json" \
      -H "X-Auth-Token: $secret_key" \
      -d '{
        "ds_record": {
          "algorithm": "rsamd5",
          "digest":
          {
            "type": "sha_1",
            "digest": "ABCD"
          }
        }
      }'
    ```

    ### Using dynamic records

    We provide the classic record types (`A`, `AAAA`, `CNAME`...) along with some dynamic records. At the moment the following dynamic records are supported: http(s) health checks and views.

    #### Service up

    This will test if a (http/https) service is up on a provided list of IPs.

    An IP is considered healthy if the query response contains the text specified in `must_contain`.

    The Record Type can be one of:

    - A
    - AAAA

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/dns-zones/dom.example.com/records \
      -X PATCH \
      -H "Content-Type: application/json" \
      -H "X-Auth-Token: $secret_key" \
      -d '{
        "return_all_records": false,
        "changes": [
          {
            "add": {
              "records": [
                {
                  "name": "service-www",
                  "data": "10.51.2.8",
                  "type": "A",
                  "ttl": 600,
                  "http_service_config": {
                    "ips": [
                      "10.51.2.8",
                      "10.51.3.7",
                      "10.51.2.9"
                    ],
                    "must_contain": "I am fine",
                    "url": "https://www.domain-test.test"
                  }
                }
              ]
            }
          }
        ]
      }'
    ```

    #### View

    View will give responses depending on the requester (or resolver) IP.

    Record Type can be:

    - A
    - AAAA
    - CNAME
    - TXT

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/dns-zones/dom.example.com/records \
      -X PATCH \
      -H "Content-Type: application/json" \
      -H "X-Auth-Token: $secret_key" \
      -d '{
        "return_all_records": false,
        "changes": [
          {
            "set": {
              "id_fields": {
                "name": "test",
                "type": "CNAME"
              },
              "records": [
                {
                  "name": "test",
                  "data": "default-domain.com.",
                  "type": "CNAME",
                  "ttl": 600,
                  "view_config": {
                    "views": [
                      {
                        "subnet": "10.51.0.0/16",
                        "data": "filtered-domain.com."
                      }
                    ]
                  }
                }
              ]
            }
          }
        ]
      }'
    ```

    ### List the records in the zone

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/dns-zones/subdomain.domain-external.test/records \
      -H "X-Auth-Token: $secret_key"

    {
      "total_count": 3,
      "records": [
        {
          "data": "<UUID>",
          "data": "127.0.0.1",
          "name": "test1",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        },
        {
          "data": "<UUID>",
          "data": "127.0.0.2",
          "name": "test2",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        },
        {
          "data": "<UUID>",
          "data": "127.0.0.3",
          "name": "test3",
          "priority": 0,
          "ttl": 3600,
          "type": "A"
        }
      ]
    }
    ```

    ### Delete the zone

    Delete the zone AND all the records, NS included:

    ```bash
    curl https://api.scaleway.com/domain/v2beta1/dns-zones/subdomain.domain-external.test/records \
      -X DELETE \
      -H "X-Auth-Token: $secret_key"

    {}
    ```
  version: v2beta1
servers:
- url: https://api.scaleway.com
tags:
- name: DNS Zones
- name: Records
- name: Versions
- name: Imports / Exports
components:
  schemas:
    google.protobuf.StringValue:
      type: string
      nullable: true
    google.protobuf.UInt32Value:
      type: integer
      nullable: true
    scaleway.domain.v2beta1.ClearDNSZoneRecordsResponse:
      type: object
    scaleway.domain.v2beta1.DNSZone:
      type: object
      properties:
        domain:
          type: string
        subdomain:
          type: string
        ns:
          type: array
          items:
            type: string
        ns_default:
          type: array
          items:
            type: string
        ns_master:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/scaleway.domain.v2beta1.DNSZone.Status'
        message:
          $ref: '#/components/schemas/google.protobuf.StringValue'
        updated_at:
          type: string
          description: (RFC 3339 format)
          format: date-time
          example: "2022-03-22T12:34:56.123456Z"
          nullable: true
        project_id:
          type: string
      x-properties-order:
      - domain
      - subdomain
      - ns
      - ns_default
      - ns_master
      - status
      - message
      - updated_at
      - project_id
    scaleway.domain.v2beta1.DNSZone.Status:
      type: string
      enum:
      - unknown
      - active
      - pending
      - error
      - locked
      default: unknown
    scaleway.domain.v2beta1.DNSZoneVersion:
      type: object
      properties:
        id:
          type: string
          description: (UUID format)
          example: 6170692e-7363-616c-6577-61792e636f6d
        created_at:
          type: string
          description: (RFC 3339 format)
          format: date-time
          example: "2022-03-22T12:34:56.123456Z"
          nullable: true
      x-properties-order:
      - id
      - created_at
    scaleway.domain.v2beta1.DeleteDNSZoneResponse:
      type: object
    scaleway.domain.v2beta1.DeleteSSLCertificateResponse:
      type: object
    scaleway.domain.v2beta1.GetDNSZoneTsigKeyResponse:
      type: object
      properties:
        name:
          type: string
        key:
          type: string
        algorithm:
          type: string
      x-properties-order:
      - name
      - key
      - algorithm
    scaleway.domain.v2beta1.GetDNSZoneVersionDiffResponse:
      type: object
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.RecordChange'
      x-properties-order:
      - changes
    scaleway.domain.v2beta1.ImportProviderDNSZoneResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.Record'
      x-properties-order:
      - records
    scaleway.domain.v2beta1.ImportRawDNSZoneRequest.TsigKey:
      type: object
      properties:
        name:
          type: string
        key:
          type: string
        algorithm:
          type: string
      x-properties-order:
      - name
      - key
      - algorithm
    scaleway.domain.v2beta1.ImportRawDNSZoneResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.Record'
      x-properties-order:
      - records
    scaleway.domain.v2beta1.ListDNSZoneNameserversResponse:
      type: object
      properties:
        ns:
          type: array
          description: The returned DNS zone nameservers
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.Nameserver'
      x-properties-order:
      - ns
    scaleway.domain.v2beta1.ListDNSZoneRecordsResponse:
      type: object
      properties:
        total_count:
          type: integer
          description: The total number of DNS zone records
          format: uint32
        records:
          type: array
          description: The paginated returned DNS zone records
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.Record'
      x-properties-order:
      - total_count
      - records
    scaleway.domain.v2beta1.ListDNSZoneVersionRecordsResponse:
      type: object
      properties:
        total_count:
          type: integer
          description: The total number of DNS zones versions records
          format: uint32
        records:
          type: array
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.Record'
      x-properties-order:
      - total_count
      - records
    scaleway.domain.v2beta1.ListDNSZoneVersionsResponse:
      type: object
      properties:
        total_count:
          type: integer
          description: The total number of DNS zones versions
          format: uint32
        versions:
          type: array
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.DNSZoneVersion'
      x-properties-order:
      - total_count
      - versions
    scaleway.domain.v2beta1.ListDNSZonesResponse:
      type: object
      properties:
        total_count:
          type: integer
          description: The total number of DNS zones
          format: uint32
        dns_zones:
          type: array
          description: The paginated returned DNS zones
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.DNSZone'
      x-properties-order:
      - total_count
      - dns_zones
    scaleway.domain.v2beta1.ListSSLCertificatesResponse:
      type: object
      properties:
        total_count:
          type: integer
          format: uint32
        certificates:
          type: array
          items:
            $ref: '#/components/schemas/scaleway.domain.v2beta1.SSLCertificate'
      x-properties-order:
      - total_count
      - certificates
    scaleway.domain.v2beta1.Nameserver:
      type: object
      properties:
        name:
          type: string
        ip:
