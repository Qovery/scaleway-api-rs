paths:
  /domain/v2beta1/dns-zones:
    get:
      tags:
      - DNS Zones
      operationId: ListDNSZones
      summary: List DNS zones
      description: |
        Returns a list of manageable DNS zones.
        You can filter the DNS zones by domain name.
      parameters:
      - in: query
        name: organization_id
        description: The organization ID on which to filter the returned DNS zones
        schema:
          type: string
          description: The organization ID on which to filter the returned DNS zones
          nullable: true
      - in: query
        name: project_id
        description: The project ID on which to filter the returned DNS zones
        schema:
          type: string
          description: The project ID on which to filter the returned DNS zones
          nullable: true
      - in: query
        name: order_by
        description: The sort order of the returned DNS zones
        schema:
          type: string
          description: The sort order of the returned DNS zones
          enum:
          - domain_asc
          - domain_desc
          - subdomain_asc
          - subdomain_desc
          default: domain_asc
      - in: query
        name: page
        description: The page number for the returned DNS zones
        schema:
          type: integer
          description: The page number for the returned DNS zones
          default: 1
      - in: query
        name: page_size
        description: The maximum number of DNS zones per page
        schema:
          type: integer
          description: The maximum number of DNS zones per page
          default: 20
      - in: query
        name: domain
        description: The domain on which to filter the returned DNS zones
        schema:
          type: string
          description: The domain on which to filter the returned DNS zones
      - in: query
        name: dns_zone
        description: The DNS zone on which to filter the returned DNS zones
        schema:
          type: string
          description: The DNS zone on which to filter the returned DNS zones
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.domain.v2beta1.ListDNSZonesResponse'
      security:
      - scaleway: []
      x-codeSamples:
      - lang: cURL
        source: |-
          curl -X GET \
            -H "X-Auth-Token: $SCW_SECRET_KEY" \
            "https://api.scaleway.com/domain/v2beta1/dns-zones?dns_zone=string&domain=string"
      - lang: HTTPie
        source: |-
          http GET "https://api.scaleway.com/domain/v2beta1/dns-zones" \
            X-Auth-Token:$SCW_SECRET_KEY \
            dns_zone==string \
            domain==string
    post:
      tags:
      - DNS Zones
      operationId: CreateDNSZone
      summary: Create a DNS zone
      description: Create a new DNS zone.
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scaleway.domain.v2beta1.DNSZone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  description: The domain of the DNS zone to create
                subdomain:
                  type: string
                  description: The subdomain of the DNS zone to create
                project_id:
                  type: string
                  description: The project ID where the DNS zone will be created
              required:
              - domain
              - subdomain
              - project_id
              x-properties-order:
              - domain
              - subdomain
              - project_id
      security:
      - scaleway: []
      x-codeSamples:
      - lang: cURL
        source: |-
          curl -X POST \
            -H "X-Auth-Token: $SCW_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "domain": "string",
              "project_id": "string",
              "subdomain": "string"
            }' \
            "https://api.scaleway.com/domain/v2beta1/dns-zones"
      - lang: HTTPie
        source: |-
          http POST "https://api.scaleway.com/domain/v2beta1/dns-zones" \
            X-Auth-Token:$SCW_SECRET_KEY \
            domain="string" \
            project_id="string" \
            subdomain="string"
