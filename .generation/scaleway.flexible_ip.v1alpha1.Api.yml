                  description: Tags to associate with the Flexible IP
                  nullable: true
                  items:
                    type: string
                reverse:
                  type: string
                  description: Reverse DNS value
                  nullable: true
              x-properties-order:
              - description
              - tags
              - reverse
      security:
      - scaleway: []
      x-codeSamples:
      - lang: cURL
        source: |-
          curl -X PATCH \
            -H "X-Auth-Token: $SCW_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.scaleway.com/flexible-ip/v1alpha1/zones/{zone}/fips/{fip_id}"
      - lang: HTTPie
        source: |-
          http PATCH "https://api.scaleway.com/flexible-ip/v1alpha1/zones/{zone}/fips/{fip_id}" \
            X-Auth-Token:$SCW_SECRET_KEY
    delete:
      tags:
