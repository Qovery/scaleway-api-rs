      summary: Delete a Flexible IP
      parameters:
      - in: path
        name: zone
        description: The zone you want to target
        required: true
        schema:
          type: string
          description: The zone you want to target
          enum:
          - fr-par-1
          - fr-par-2
          - nl-ams-1
      - in: path
        name: fip_id
        description: ID of the Flexible IP to delete
